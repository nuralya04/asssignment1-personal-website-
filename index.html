  <style>
    /* Add styles to make anchor tags look like buttons */
    nav a {
      display: inline-block;
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-right: 10px;
      text-align: center;
      transition: background-color 0.3s;
    }

    nav a:hover {
      background-color: #45a049;
    }

    nav a:active {
      background-color: #388e3c;
    }
  </style>
</head>
